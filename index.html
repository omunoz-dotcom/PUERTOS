<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Ticket de Peso — Almacenera S.A.</title>
<style>
  :root{
    --azul:#0b3d91; --azul-claro:#1565c0; --verde:#2e7d32;
    --gris:#eef2f6; --borde:#d8dee6; --texto:#1b2733; --rojo:#c62828;
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',system-ui,Arial,sans-serif;}
  body{background:var(--gris); color:var(--texto); min-height:100vh; padding:16px;}
  .card{max-width:480px; margin:0 auto; background:#fff; border-radius:14px;
        box-shadow:0 6px 24px rgba(0,0,0,.09); overflow:hidden;}
  header{background:linear-gradient(135deg,var(--azul),var(--azul-claro));
         color:#fff; padding:22px 20px; text-align:center;}
  header h1{font-size:1.15rem; font-weight:600; letter-spacing:.2px;}
  header p{font-size:.8rem; opacity:.92; margin-top:4px;}
  .cuerpo{padding:20px;}
  .aviso{background:#eef4ff; border:1px solid #cfe0ff; color:#274b8f;
        font-size:.8rem; border-radius:9px; padding:10px 12px; margin-bottom:6px; line-height:1.35;}
  label{display:block; font-size:.82rem; font-weight:600; margin:16px 0 6px; color:#37474f;}
  label.req::after{content:" *"; color:var(--rojo);}
  input{width:100%; padding:11px 12px; border:1px solid var(--borde);
        border-radius:9px; font-size:.95rem; background:#fff; color:var(--texto);}
  input:focus{outline:none; border-color:var(--azul-claro);
        box-shadow:0 0 0 3px rgba(21,101,192,.14);}
  .foto-zona{border:2px dashed var(--borde); border-radius:11px; padding:22px;
        text-align:center; cursor:pointer; transition:border-color .2s, background .2s; background:#fafbfc;}
  .foto-zona:hover,.foto-zona:focus-within{border-color:var(--azul-claro); background:#f3f8ff;}
  .foto-zona .icono{font-size:2rem; line-height:1;}
  .foto-zona span{display:block; font-size:.85rem; color:#607d8b; margin-top:8px;}
  #preview{display:none; width:100%; border-radius:10px; margin-top:12px; border:1px solid var(--borde);}
  .btn{width:100%; margin-top:22px; padding:14px; border:none; border-radius:10px;
        background:var(--azul); color:#fff; font-size:1rem; font-weight:600; cursor:pointer; transition:background .2s;}
  .btn:hover:not(:disabled){background:#08306f;}
  .btn:disabled{opacity:.6; cursor:default;}
  .msg{margin-top:14px; padding:12px; border-radius:9px; font-size:.9rem; text-align:center; display:none;}
  .msg.ok{background:#e8f5e9; color:var(--verde); display:block;}
  .msg.err{background:#ffebee; color:var(--rojo); display:block;}
  .spinner{display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.4);
        border-top-color:#fff; border-radius:50%; animation:giro .7s linear infinite; vertical-align:-3px; margin-right:6px;}
  @keyframes giro{to{transform:rotate(360deg);}}
  footer{text-align:center; font-size:.72rem; color:#90a4ae; padding:0 20px 18px;}
  @media (prefers-reduced-motion: reduce){ .spinner{animation:none;} }
</style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Registro de Ticket de Peso</h1>
      <p>Almacenera S.A. — Recepción de Grano</p>
    </header>

    <div class="cuerpo">
      <div class="aviso">Solo sube la foto del ticket. El sistema lee automáticamente buque, producto, placa y pesos.</div>

      <label class="req">Foto del ticket</label>
      <div class="foto-zona" id="zona" tabindex="0" role="button"
           onclick="document.getElementById('archivo').click()"
           onkeypress="if(event.key==='Enter'){document.getElementById('archivo').click()}">
        <div class="icono">📷</div>
        <span>Toca para tomar la foto o subir una imagen</span>
      </div>
      <input type="file" id="archivo" accept="image/*" style="display:none">
      <img id="preview" alt="Vista previa del ticket">

      <label>Registrado por (opcional)</label>
      <input type="text" id="registradoPor" placeholder="Tu nombre">

      <button type="button" class="btn" id="enviar">Enviar registro</button>
      <div class="msg" id="msg" role="status"></div>
    </div>

    <footer>La información se guarda, se lee y se notifica por correo automáticamente.</footer>
  </div>

  <!-- Formulario oculto: POST hacia Apps Script (iframe, evita CORS) -->
  <form id="formEnvio" method="POST" target="frameOculto" style="display:none">
    <input type="hidden" name="imagen"        id="f_imagen">
    <input type="hidden" name="registradoPor" id="f_registradoPor">
  </form>
  <iframe name="frameOculto" id="frameOculto" style="display:none"></iframe>

<script>
  // ============ URL DE TU APPS SCRIPT (termina en /exec) ============
  const API_URL = 'https://script.google.com/macros/s/AKfycbxaSTy2-36mCK73tTImBDmtmJW2buJJHeQENnpjUTvq1PDlzM7OSkHt0mz6IUqcMZBvHQ/exec';
  // ==================================================================

  const $ = id => document.getElementById(id);
  let imagenLista = '';
  let enviando = false;

  document.getElementById('formEnvio').action = API_URL;

  // --- Redimensionar a max 1600px / JPEG 0.85 antes de subir ---
  $('archivo').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > h && w > MAX){ h = Math.round(h * MAX / w); w = MAX; }
        else if (h > MAX)   { w = Math.round(w * MAX / h); h = MAX; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        imagenLista = c.toDataURL('image/jpeg', 0.85);
        $('preview').src = imagenLista;
        $('preview').style.display = 'block';
        $('zona').style.display = 'none';
        $('msg').className = 'msg';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // --- La carga del iframe = respuesta recibida ---
  $('frameOculto').addEventListener('load', () => {
    if (!enviando) return;
    enviando = false;
    mostrar('Registro enviado correctamente. ¡Gracias!', 'ok');
    $('registradoPor').value = '';
    imagenLista = '';
    $('preview').style.display = 'none';
    $('zona').style.display = 'block';
    botonNormal();
  });

  // --- Enviar ---
  $('enviar').addEventListener('click', () => {
    if (!imagenLista){ mostrar('Primero toma o sube la foto del ticket.', 'err'); return; }
    if (API_URL.indexOf('PEGAR') > -1){ mostrar('Falta configurar la URL del Apps Script.', 'err'); return; }

    $('f_imagen').value        = imagenLista;
    $('f_registradoPor').value = $('registradoPor').value;

    enviando = true;
    botonCargando();
    $('formEnvio').submit();
  });

  function mostrar(txt, tipo){ const m = $('msg'); m.textContent = txt; m.className = 'msg ' + tipo; }
  function botonCargando(){ const b = $('enviar'); b.disabled = true; b.innerHTML = '<span class="spinner"></span>Enviando…'; }
  function botonNormal(){ const b = $('enviar'); b.disabled = false; b.textContent = 'Enviar registro'; }
</script>
</body>
</html>
